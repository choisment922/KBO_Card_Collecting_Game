<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ 야구 카드 게임 — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body {
  min-height:100vh; background:#0a0e1a;
  display:flex; align-items:center; justify-content:center;
  font-family:'Noto Sans KR',sans-serif;
  background-image:
    radial-gradient(ellipse at 20% 50%,#1a1040 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,#0d2040 0%,transparent 50%);
}
.card {
  background:#111827; border:1px solid #1e293b; border-radius:24px;
  padding:48px 40px; width:100%; max-width:400px; text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.logo { font-size:3.5rem; margin-bottom:8px; }
h1 {
  font-family:'Black Han Sans'; font-size:1.8rem; letter-spacing:1px;
  background:linear-gradient(90deg,#f59e0b,#f97316);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px;
}
.subtitle { color:#64748b; font-size:.88rem; line-height:1.6; margin-bottom:36px; }

.btn-google {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; padding:14px 20px; background:#fff; color:#1a1a1a;
  border:none; border-radius:12px; font-size:.95rem; font-weight:700;
  font-family:'Noto Sans KR'; cursor:pointer; text-decoration:none;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.btn-google:hover  { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.4); }
.btn-google:active { transform:translateY(0); }
.g-icon { width:22px; height:22px; flex-shrink:0; }

hr { margin:28px 0; border:none; border-top:1px solid #1e293b; }
.features { display:flex; flex-direction:column; gap:10px; text-align:left; }
.feat { display:flex; align-items:center; gap:10px; font-size:.82rem; color:#64748b; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚾</div>
  <h1>야구 카드 게임</h1>
  <p class="subtitle">숫자 야구를 클리어하고<br>레어 야구 선수 카드를 모아보세요!</p>

  <a href="/auth/google" class="btn-google">
    <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Google로 로그인
  </a>

  <hr>

  <div class="features">
    <div class="feat"><span>🎯</span><span>숫자 야구로 카드 획득 — 빠를수록 레어!</span></div>
    <div class="feat"><span>🌌</span><span>홀로그램 카드 효과로 실제 트레이딩 카드 느낌</span></div>
    <div class="feat"><span>🗂️</span><span>내 컬렉션이 계정에 저장 — 어디서든 확인</span></div>
  </div>
</div>
</body>
</html>
